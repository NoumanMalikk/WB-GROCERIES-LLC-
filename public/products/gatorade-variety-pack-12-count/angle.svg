<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img" aria-label="${safe}">
  <rect width="800" height="800" fill="#FFFFFF"/>
  <rect x="60" y="60" width="680" height="680" rx="24" fill="#FFF9EE" stroke="#DCE5DE" stroke-width="2"/>
  <rect x="300" y="140" width="200" height="140" rx="16" fill="${accent}" opacity="0.12"/>
  <path d="M340 210h120l-12 70H352z" fill="${accent}" opacity="0.35"/>
  <circle cx="400" cy="190" r="18" fill="${accent}"/>
  <text x="400" y="280" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="600" fill="#A96A16" letter-spacing="1">DEVELOPMENT PLACEHOLDER</text>
  ${lines.slice(0,4).map((line,i)=>`<text x="400" y="${320+i*28}" text-anchor="middle" font-family="Manrope,Arial,sans-serif" font-size="22" font-weight="700" fill="#17221C">${line}</text>`).join('\n')}
  <text x="400" y="480" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" fill="#606B64">${label}</text>
  <text x="400" y="520" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" fill="#606B64">Authorized manufacturer packshot needed</text>
  <text x="400" y="560" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" fill="#606B64">White-background product photography</text>
  <text x="400" y="640" text-anchor="middle" font-family="Manrope,Arial,sans-serif" font-size="16" font-weight="700" fill="#184C35">WB Groceries</text>
</svg>